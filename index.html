<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nami Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:20px;
  background:#020617;
  color:#a78bfa;
  font-weight:600;
}

/* ANIME */
.anime{
  text-align:center;
  margin-top:10px;
}
.anime img{
  width:120px;
  border-radius:50%;
  box-shadow:0 0 25px #7c3aed;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:80%;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.user{
  background:#22d3ee;
  margin-left:auto;
}

.bot{
  background:#1e293b;
}

/* INPUT */
.input-box{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7c3aed;
  color:white;
}

/* MOBILE RESPONSIVE */
@media(max-width:600px){
  .anime img{width:90px;}
}
</style>
</head>

<body>

<header>💜 Nami Assistant</header>

<div class="anime">
  <img src="https://i.pinimg.com/736x/ea/92/aa/ea92aa0f0c61c71b0c71c1b08c4a4e77.jpg">
</div>

<div id="chat" class="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Talk to Nami...">
  <button onclick="sendMessage()">Send</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>

let userId="user_"+Math.random();

/* ADD MESSAGE */
function addMessage(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

/* SEND */
async function sendMessage(){
  let msg=input.value;
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  try{
    const res=await fetch("https://zrya-ai.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg,userId})
    });

    const data=await res.json();

    let reply="Hello Boss 😎\n"+data.reply;

    typeWriter(reply);
    speak(reply);

    handleCommands(msg);

  }catch{
    addMessage("Server error 😢","bot");
  }
}

/* TYPE EFFECT */
function typeWriter(text){
  let div=document.createElement("div");
  div.className="msg bot";
  chat.appendChild(div);

  let i=0;
  let interval=setInterval(()=>{
    div.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },15);
}

/* VOICE INPUT */
function startVoice(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-IN";
  rec.start();

  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    sendMessage();
  }
}

/* WAKE WORD */
function startWakeWord(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-IN";
  rec.continuous=true;

  rec.onresult=e=>{
    let text=e.results[e.results.length-1][0].transcript.toLowerCase();

    if(text.includes("hey nami")){
      speak("Yes boss, I'm listening 💜");
      startVoice();
    }
  }

  rec.start();
}
startWakeWord();

/* VOICE OUTPUT */
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);

  let voices=speechSynthesis.getVoices();
  let female=voices.find(v=>v.name.includes("Female")||v.name.includes("Zira"));
  if(female) speech.voice=female;

  speech.pitch=1.4;
  speech.rate=0.95;

  speechSynthesis.speak(speech);
}

/* COMMANDS */
function handleCommands(msg){
  msg=msg.toLowerCase();

  if(msg.includes("play song")){
    window.open("https://www.youtube.com/results?search_query=song");
  }

  if(msg.includes("open youtube")){
    window.open("https://youtube.com");
  }

  if(msg.includes("open google")){
    window.open("https://google.com");
  }
}

</script>

</body>
</html>

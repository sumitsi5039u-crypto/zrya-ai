<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zrya AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
}

/* HEADER */
header{
  text-align:center;
  padding:15px;
  font-size:24px;
  color:#a78bfa;
}

/* LOGIN */
.login-box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  box-shadow:0 0 30px #7c3aed;
  text-align:center;
}

/* CHAT */
.chat-container{
  display:none;
  max-width:700px;
  margin:auto;
  height:80vh;
  display:flex;
  flex-direction:column;
}

.chat{
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.msg{
  padding:12px;
  margin:10px;
  border-radius:12px;
  max-width:70%;
}

.user{background:#22d3ee;margin-left:auto;}
.bot{background:#1e293b;}

.input-box{
  display:flex;
  padding:10px;
  background:#020617;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7c3aed;
  color:white;
}

/* AVATAR */
.avatar{
  position:fixed;
  right:20px;
  bottom:20px;
}

.avatar img{
  width:180px;
  border-radius:20px;
  box-shadow:0 0 40px #7c3aed;
  animation:float 3s infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
</style>
</head>

<body>

<header>Zrya AI 💜</header>

<div class="login-box" id="loginBox">
  <h2>Welcome 💫</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="chat-container" id="chatContainer">
  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Ask anything...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

<div class="avatar">
  <img id="avatar" src="zrya.png">
</div>

<script>
let userId = localStorage.getItem("userId") || "user_"+Math.random();

/* LOAD MEMORY */
window.onload = ()=>{
  chat.innerHTML = localStorage.getItem("chat_history") || "";
}

/* LOGIN */
function login(){
  loginBox.style.display="none";
  chatContainer.style.display="flex";
}

/* ADD MESSAGE */
function addMessage(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  localStorage.setItem("chat_history", chat.innerHTML);
}

/* SEND MESSAGE */
async function sendMessage(){
  let msg=input.value;
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  try{
    const res=await fetch("http://localhost:3000/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg,userId})
    });

    const data=await res.json();
    typingEffect(data.reply);
    speak(data.reply);

  }catch(err){
    addMessage("Server connection error 😢","bot");
  }
}

/* TYPING EFFECT */
function typingEffect(text){
  let div=document.createElement("div");
  div.className="msg bot";
  chat.appendChild(div);

  let i=0;
  let interval=setInterval(()=>{
    div.innerText+=text[i];
    i++;
    if(i>=text.length){
      clearInterval(interval);
      localStorage.setItem("chat_history", chat.innerHTML);
    }
  },15);
}

/* VOICE INPUT */
function startVoice(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-US";
  rec.start();

  rec.onresult=e=>{
    let text=e.results[0][0].transcript;
    addMessage(text,"user");
    sendToAI(text);
  }
}

async function sendToAI(message){
  const res=await fetch("http://localhost:3000/chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message,userId})
  });

  const data=await res.json();
  typingEffect(data.reply);
  speak(data.reply);
}

/* ULTRA VOICE + EMOTION */
function speak(text){
  const avatar=document.getElementById("avatar");

  let speech=new SpeechSynthesisUtterance(text);
  let voices=speechSynthesis.getVoices();

  let female=voices.find(v=>v.name.toLowerCase().includes("female")||v.name.includes("Zira"));
  if(female) speech.voice=female;

  speech.pitch=1.4;
  speech.rate=0.95;

  let mood="normal";

  if(text.includes("😔")) mood="sad";
  if(text.includes("😄")) mood="happy";
  if(text.includes("💖")) mood="love";

  let interval=setInterval(()=>{
    if(mood==="happy") avatar.style.transform="scale(1.15)";
    else if(mood==="sad") avatar.style.transform="scale(0.9)";
    else avatar.style.transform="scale(1.05)";
  },150);

  speech.onend=()=>{
    clearInterval(interval);
    avatar.style.transform="scale(1)";
  }

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>

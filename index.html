<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nami AI</title>

<style>
:root{
  --bg:#343541;
  --chat:#444654;
  --text:white;
}

.light{
  --bg:#f5f5f5;
  --chat:#ffffff;
  --text:#000;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  transition:0.3s;
}

/* Animated background */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 30%,#7c3aed33,transparent),
             radial-gradient(circle at 80% 70%,#22d3ee33,transparent);
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#202123;
  padding:10px;
}

button{
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
header{
  padding:10px;
  text-align:center;
  border-bottom:1px solid #555;
}

/* CHAT */
.chat{
  flex:1;
  overflow-y:auto;
}

.row{
  padding:15px;
}

.user{background:transparent;}
.bot{background:var(--chat);}

.bubble{
  max-width:700px;
  margin:auto;
}

/* INPUT */
.input-box{
  padding:10px;
  display:flex;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <button onclick="toggleTheme()">🌗 Theme</button>
</div>

<div class="main">
  <header>Nami AI 💜</header>

  <div id="chat" class="chat"></div>

  <div class="input-box">
    <input id="input" placeholder="Talk to Nami...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
  </div>
</div>

<script>

let userId="user_"+Math.random();

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
}

/* ADD MESSAGE */
function addMessage(text,type){
  let row=document.createElement("div");
  row.className="row "+type;

  let bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerText=text;

  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop=chat.scrollHeight;
}

/* SEND */
async function sendMessage(){
  let msg=input.value;
  if(!msg) return;

  addMessage(msg,"user");
  input.value="";

  try{
    const res=await fetch("https://zrya-ai.onrender.com/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:msg,userId})
    });

    const data=await res.json();

    let reply = styleReply(data.reply);

    typeWriter(reply);
    speak(reply);

  }catch{
    addMessage("Oops 😢 server issue","bot");
  }
}

/* SMART STYLE (Jarvis + GF tone) */
function styleReply(text){
  return "💜 Nami: " + text;
}

/* TYPEWRITER */
function typeWriter(text){
  let row=document.createElement("div");
  row.className="row bot";

  let bubble=document.createElement("div");
  bubble.className="bubble";

  row.appendChild(bubble);
  chat.appendChild(row);

  let i=0;
  let interval=setInterval(()=>{
    bubble.innerText+=text[i];
    i++;
    if(i>=text.length) clearInterval(interval);
  },10);
}

/* VOICE INPUT */
function startVoice(){
  const rec=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  rec.lang="en-IN";
  rec.start();

  rec.onresult=e=>{
    input.value=e.results[0][0].transcript;
    sendMessage();
  }
}

/* EMOTIONAL VOICE */
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);

  let voices=speechSynthesis.getVoices();

  let female=voices.find(v=>v.name.includes("Female")||v.name.includes("Zira"));
  if(female) speech.voice=female;

  speech.pitch=1.4;
  speech.rate=0.95;

  // Emotion tone
  if(text.includes("sorry")) speech.pitch=1.1;
  if(text.includes("love")) speech.pitch=1.6;

  speechSynthesis.speak(speech);
}

/* NEW CHAT */
function newChat(){
  chat.innerHTML="";
}

</script>

</body>
</html>
